version: '3.8'

services:
  sftp-proxy:
    build: .
    container_name: sftp-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount config.json from host (so you can edit it without rebuilding)
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production
    networks:
      - proxy-network
    # Auto-restart policy
    restart: always
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-network:
    driver: bridge
