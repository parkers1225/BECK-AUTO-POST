<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beck Auto-Post · Users</title>
<style>
  :root{
    --bg:#070b14;--surf:#111c30;--surf2:rgba(255,255,255,.045);--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.18);
    --tx:#EAF1FB;--tx2:#8595B0;--tx3:#5E708C;--acc:#4DA3FF;--ok:#3FE0A8;--warn:#FFB454;--danger:#FF6B6B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);
    background-image:radial-gradient(120% 90% at 50% -10%,#1a273f,#0c1322 50%,#070b14);color:var(--tx);
    min-height:100vh;padding:28px 18px;font-size:14px;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .tag{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3)}
  .sub{color:var(--tx2);margin-bottom:22px;font-size:13px}
  .card{background:var(--surf2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px}
  .card h2{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
  input,select{background:var(--surf);border:1px solid var(--line);color:var(--tx);font-size:14px;
    padding:10px 12px;border-radius:10px;outline:none;font-family:inherit}
  input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(77,163,255,.18)}
  .grow{flex:1;min-width:160px}
  button{font-family:inherit;cursor:pointer;border-radius:10px;font-weight:600;font-size:13px;padding:10px 16px;
    border:1px solid var(--line2);background:var(--surf2);color:var(--tx);transition:.14s}
  button:hover{background:rgba(255,255,255,.08)}
  button.primary{border:none;background:linear-gradient(135deg,#4DA3FF,#6366F1);color:#fff}
  button.sm{padding:6px 10px;font-size:12px;border-radius:8px}
  button.danger{color:var(--danger);border-color:rgba(255,107,107,.3)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);font-weight:600;padding:0 10px 10px}
  td{padding:11px 10px;border-top:1px solid var(--line);vertical-align:middle}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;font-weight:600;letter-spacing:.04em;
    background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:5px 9px;display:inline-flex;align-items:center;gap:8px}
  .code button{padding:2px 6px;font-size:11px;border:none;background:transparent;color:var(--tx2)}
  .pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill.on{background:rgba(63,224,168,.14);color:var(--ok)}
  .pill.off{background:rgba(255,107,107,.14);color:var(--danger)}
  .muted{color:var(--tx3);font-size:12px}
  .acts{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf);border:1px solid var(--line2);
    padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 16px 40px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .empty{text-align:center;color:var(--tx2);padding:30px}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>beck</h1><span class="tag">Auto-Post · Users</span></header>
  <p class="sub">Add a person to a store, send them their access code. Deactivate to cut access instantly.</p>

  <div class="card">
    <h2>Add a person</h2>
    <div class="row">
      <div class="grow"><label for="newName">Name</label><input id="newName" placeholder="Jordan Smith" autocomplete="off"></div>
      <div><label for="newStore">Store</label><select id="newStore"></select></div>
      <button class="primary" id="addBtn">Add &amp; generate code</button>
    </div>
  </div>

  <div class="card">
    <h2>People</h2>
    <table>
      <thead><tr><th>Name</th><th>Store</th><th>Access code</th><th>Status</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let STORES = [];
const $ = id => document.getElementById(id);
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
async function api(method, path, body){
  const r = await fetch(path, { method, headers: body?{'Content-Type':'application/json'}:{}, body: body?JSON.stringify(body):undefined });
  if(!r.ok){ const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||('HTTP '+r.status)); }
  return r.status===204?null:r.json();
}
function storeOptions(sel){ return STORES.map(s=>`<option value="${s.id}"${s.id===sel?' selected':''}>${s.name||s.id}</option>`).join(''); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadStores(){
  try { const d = await (await fetch('/stores')).json(); STORES = d.stores||[]; }
  catch(e){ STORES = []; }
  $('newStore').innerHTML = storeOptions();
}

async function loadUsers(){
  try {
    const users = await api('GET','/admin/api/users');
    const tb = $('rows');
    if(!users.length){ tb.innerHTML = '<tr><td colspan="5" class="empty">No people yet — add someone above.</td></tr>'; return; }
    tb.innerHTML = users.map(u=>`
      <tr data-id="${u.id}">
        <td>${esc(u.name)}</td>
        <td><select class="reassign" data-id="${u.id}">${storeOptions(u.store)}</select></td>
        <td><span class="code">${esc(u.code)}<button data-copy="${esc(u.code)}" title="Copy">copy</button></span></td>
        <td><span class="pill ${u.active?'on':'off'}">${u.active?'Active':'Revoked'}</span></td>
        <td><div class="acts">
          <button class="sm toggle" data-id="${u.id}" data-active="${u.active}">${u.active?'Deactivate':'Reactivate'}</button>
          <button class="sm danger del" data-id="${u.id}" data-name="${esc(u.name)}">Delete</button>
        </div></td>
      </tr>`).join('');
  } catch(e){ $('rows').innerHTML = `<tr><td colspan="5" class="empty">${esc(e.message)}</td></tr>`; }
}

document.addEventListener('click', async (e)=>{
  const t = e.target;
  if(t.dataset.copy!==undefined){ try{ await navigator.clipboard.writeText(t.dataset.copy); toast('Code copied'); }catch(_){ toast('Copy failed'); } return; }
  if(t.classList.contains('toggle')){
    try{ await api('PATCH','/admin/api/users/'+t.dataset.id,{active: t.dataset.active!=='true'}); toast('Updated'); loadUsers(); }
    catch(err){ toast(err.message); } return;
  }
  if(t.classList.contains('del')){
    if(!confirm('Delete '+t.dataset.name+'? Their code stops working.')) return;
    try{ await api('DELETE','/admin/api/users/'+t.dataset.id); toast('Deleted'); loadUsers(); }catch(err){ toast(err.message); } return;
  }
});
document.addEventListener('change', async (e)=>{
  if(e.target.classList.contains('reassign')){
    try{ await api('PATCH','/admin/api/users/'+e.target.dataset.id,{store:e.target.value}); toast('Store reassigned'); }
    catch(err){ toast(err.message); loadUsers(); }
  }
});
$('addBtn').onclick = async ()=>{
  const name=$('newName').value.trim(), store=$('newStore').value;
  if(!name){ toast('Enter a name'); return; }
  try{ const u = await api('POST','/admin/api/users',{name,store}); $('newName').value=''; toast('Added — code '+u.code); loadUsers(); }
  catch(err){ toast(err.message); }
};
$('newName').addEventListener('keydown', e=>{ if(e.key==='Enter') $('addBtn').click(); });

(async()=>{ await loadStores(); await loadUsers(); })();
</script>
</body>
</html>
